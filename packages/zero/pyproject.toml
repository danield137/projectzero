[project]
name = "projectzero"
version = "0.1.0"
description = "Project Zero - life simulation built on zero-sim"
authors = [
    {name = "Daniel Dror", email = "danield137@gmail.com"},
]
dependencies = [
    "simz",
    "termcolor>=2.5.0",
    "psutil>=7.2.1",
]
requires-python = "==3.10.*"
license = {text = """
