THE SOFTWARE IS PROVIDED "AS IS", WITHOUT WARRANTY...
"""}

[tool.uv.sources]
simz = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/zero"]
