[project]
name = "projectzero"
version = "0.1.0"
description = "Project Zero - life simulation built on zero-sim"
authors = [
    {name = "Daniel Dror", email = "danield137@gmail.com"},
]
dependencies = [
    "tigen",
    "termcolor>=2.5.0",
    "psutil>=7.2.1",
]
requires-python = "==3.10.*"
license = "MIT"

[tool.uv.sources]
tigen = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/zero"]
