[tool.uv.workspace]
members = ["packages/*"]

[tool.uv.sources]
zero-sim = { workspace = true }

[tool.ruff]
line-length = 120

[tool.ruff.lint]
select = [
    # pycodestyle
    "E",
    # Pyflakes
    "F",
    # pyupgrade
    "UP",
    # flake8-bugbear
    "B",
    # flake8-simplify
    "SIM",
    # isort
    "I",
]
ignore = [
    "B904", # Within an `except` clause, raise exceptions with `raise
    "B905", # `zip()` without an explicit `strict=` parameter
    "SIM102", # Use a single `if` statement instead of nested `if` statements
    "E501", # line too long
    "B024", # `Component` is an abstract base class, but it has no abstract methods or properties
    "UP031", # "Use format specifiers instead of percent format
]

[dependency-groups]
test = [
    "pytest>=8.3.5",
    "pyperf>=2.9.0",
    "pytest-cov>=6.1.1",
]
lint = [
    "ruff>=0.9.0",
    "pylint>=3.3.3",
]
dev = [
    "ruff>=0.14.10",
    "ty>=0.0.14",
]
